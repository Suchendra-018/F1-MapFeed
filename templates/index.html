<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 MapFeed - Telemetry Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">🏁 F1 MapFeed</span>
            <span class="navbar-text text-light">Formula 1 Telemetry Analytics & Visualization</span>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-lg-3">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5>Session Selection</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="sessionSelect" class="form-label">Race Session</label>
                            <select class="form-select" id="sessionSelect">
                                <option value="">Loading sessions...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="driverSelect" class="form-label">Driver</label>
                            <select class="form-select" id="driverSelect" disabled>
                                <option value="">Select session first</option>
                            </select>
                        </div>
                        <button class="btn btn-primary w-100 mb-2" id="analyzeBtn">
                            Analyze Driver
                        </button>
                        <button class="btn btn-success w-100" id="compareBtn" data-bs-toggle="modal" data-bs-target="#compareModal">
                            Compare Drivers
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-lg-9">
                <div id="mainContent">
                    <div class="alert alert-info">
                        <strong>👋 Welcome!</strong> Select a session and driver to begin analysis.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Compare Drivers Modal -->
    <div class="modal fade" id="compareModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Compare Multiple Drivers</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="compareDriverList"></div>
                    <div class="mt-3">
                        <label class="form-label">Select drivers to compare:</label>
                        <div id="driverCheckboxes"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="doCompareBtn">Compare</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
